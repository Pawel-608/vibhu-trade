# Standalone Cloudflare Worker — Vibhu custom-event analytics.
#
# Deliberately separate from the main Vibhu app (Next.js / OpenNext): a plain
# Worker can use a Workers Analytics Engine binding with zero adapter plumbing,
# and it cannot affect the main app's deploy.
#
# Deploy:  cd analytics-worker && npx wrangler deploy
# (or paste src/index.js into a dashboard Worker — see README.md)

name = "vibhu-analytics"
main = "src/index.js"
compatibility_date = "2026-05-20"

# Workers Analytics Engine dataset. The dataset is created automatically on the
# first writeDataPoint; query it by this name (`vibhu_events`) via the SQL API.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "vibhu_events"
